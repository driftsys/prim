name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  prim:
    name: prim self-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -q -p prim-cli -- --check .
      - run: cargo run -q -p prim-cli -- fmt --check-idempotence .

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  convco:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: |
          curl -sSfL https://github.com/convco/convco/releases/latest/download/convco-x86_64-unknown-linux-musl.tar.gz -o /tmp/convco.tar.gz
          mkdir -p /tmp/convco-extract
          tar -xzf /tmp/convco.tar.gz -C /tmp/convco-extract --strip-components=1
          mv /tmp/convco-extract/convco /usr/local/bin/convco
          chmod +x /usr/local/bin/convco
      - run: convco check ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  install-test:
    name: Install script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash tools/bash_unit spec/install/install_test.sh

  ci:
    name: CI
    if: always()
    needs: [fmt, prim, clippy, test, convco, install-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              exit 1
            fi
          done

  build-release:
    name: Build (${{ matrix.target }})
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross (aarch64-musl)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p prim-cli
      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p prim-cli
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: prim-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/prim${{ contains(matrix.target, 'windows') && '.exe' || '' }}
